<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support - Zpendr</title>
  <!-- data-zpendr-i18n-head -->
  <link rel="stylesheet" href="/assets/i18n.css" />
  <link rel="canonical" href="__SITE_URL__/en/support.html" />
  <link rel="alternate" hreflang="en" href="__SITE_URL__/en/support.html" />
  <link rel="alternate" hreflang="de" href="__SITE_URL__/de/support.html" />
  <link rel="alternate" hreflang="zh" href="__SITE_URL__/zh/support.html" />
  <link rel="alternate" hreflang="hi" href="__SITE_URL__/hi/support.html" />
  <link rel="alternate" hreflang="x-default" href="__SITE_URL__/" />
</head>
<body>
  <main style="max-width: 800px; margin: 2rem auto; padding: 0 1rem; font-family: Arial, sans-serif;">
    <h1>Support</h1>
    <p>This page is ready for localization content in en.</p>
  </main>
  <div class="lang-switcher-wrap" style="position:fixed;right:1rem;bottom:1rem;z-index:9999;padding:0.55rem 0.7rem;border-radius:999px;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);box-shadow:0 6px 20px rgba(0,0,0,0.15);">
    <label class="lang-switcher-label" for="langSwitcher">Language</label>
    <select id="langSwitcher" aria-label="Language selector">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="zh">中文</option>
      <option value="hi">हिन्दी</option>
    </select>
  </div>
  <script src="/assets/i18n.js"></script>
  <script>
    if (window.ZpendrI18n) {
      window.ZpendrI18n.initLanguageSwitcher();
    }
  </script>
</body>
</html>
